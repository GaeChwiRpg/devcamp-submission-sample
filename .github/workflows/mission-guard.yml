name: mission-guard

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate mission scope
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          CHANGED="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          MISSION_DIRS="$(echo "$CHANGED" | awk -F/ '$1 !~ /^\\./ && $1 != "meta" && $1 != "docs" && NF >= 2 {print $1}' | sort -u)"
          COUNT="$(echo "$MISSION_DIRS" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "$COUNT" -ne 1 ]; then
            echo "::group::❌ FAIL: 한 PR 에는 미션 폴더 하나만 변경해야 합니다"
            echo ""
            echo "[현재 PR 이 변경한 미션 폴더] (${COUNT}개)"
            echo "$MISSION_DIRS" | sed '/^$/d' | sed 's/^/  - /'
            echo ""
            echo "[PR 전체 변경 파일]"
            echo "$CHANGED" | sed 's/^/  /'
            echo ""
            echo "[해결]"
            echo "  - 다른 미션 폴더 변경은 별도 PR 로 분리하세요."
            echo "  - branch 를 잘못 짚었다면 'submit/<mission-id>' 형식으로 다시 PR 을 만드세요."
            echo "  - 이미 머지된 미션 폴더의 파일은 이번 PR 에서 제외하세요."
            echo "::endgroup::"
            echo "::error::한 PR 에 미션 폴더 ${COUNT}개 변경됨 (1개여야 함) — 로그 group 참고"
            exit 1
          fi

          TARGET="$(echo "$MISSION_DIRS" | head -n 1)"
          MISSION_ID="$(basename "$TARGET")"

          if [ "$BRANCH_NAME" != "submit/$MISSION_ID" ]; then
            echo "::group::❌ FAIL: branch 이름이 미션 폴더와 일치하지 않습니다"
            echo ""
            echo "[현재 branch 이름]   $BRANCH_NAME"
            echo "[변경한 미션 폴더]   $MISSION_ID"
            echo "[기대하는 branch]    submit/$MISSION_ID"
            echo ""
            echo "[해결]"
            echo "  branch 이름을 'submit/$MISSION_ID' 로 맞추거나,"
            echo "  의도한 미션 폴더만 PR 에 포함시키세요."
            echo "::endgroup::"
            echo "::error::branch '$BRANCH_NAME' ≠ 미션 '$MISSION_ID' — 로그 group 참고"
            exit 1
          fi

          if [ ! -f "$TARGET/report.md" ]; then
            echo "::group::❌ FAIL: $TARGET/report.md 파일이 없습니다"
            echo ""
            echo "[원인]"
            echo "  미션 제출에는 $TARGET/report.md 가 필수입니다."
            echo "  (학생이 자기 시도·판단·회고를 적는 리포트)"
            echo ""
            echo "[해결]"
            echo "  학생 레포의 미션 README 를 참고해 $TARGET/report.md 를 생성·작성한 뒤 다시 commit 하세요."
            echo "::endgroup::"
            echo "::error::$TARGET/report.md 파일이 없음 — 로그 group 참고"
            exit 1
          fi

          if [ ! -d "$TARGET/evidence" ]; then
            echo "::group::❌ FAIL: $TARGET/evidence/ 디렉토리가 없습니다"
            echo ""
            echo "[원인]"
            echo "  미션 제출에는 $TARGET/evidence/ 폴더 (증빙) 가 필수입니다."
            echo ""
            echo "[해결]"
            echo "  mkdir -p $TARGET/evidence/ 한 뒤 증빙 파일을 추가하세요."
            echo "  (예: response-samples.md, test-results.md 등)"
            echo "::endgroup::"
            echo "::error::$TARGET/evidence/ 디렉토리 없음 — 로그 group 참고"
            exit 1
          fi

          if ! echo "$CHANGED" | grep -qx "$TARGET/report.md"; then
            echo "::group::❌ FAIL: $TARGET/report.md 가 이번 PR 의 변경에 포함되지 않았습니다"
            echo ""
            echo "[이유]"
            echo "  매 PR 마다 report.md 가 한 줄이라도 같이 갱신되어야 합니다."
            echo "  코드 변경의 *맥락* 이 report.md 에 누적되어야 평가·면접 답변에 쓸 수 있기 때문."
            echo ""
            echo "[이번 PR 의 변경 파일]"
            echo "$CHANGED" | sed 's/^/  /'
            echo ""
            echo "[해결]"
            echo "  $TARGET/report.md 끝에 patch 노트 한 줄 추가 후 다시 commit:"
            echo ""
            echo "    cat >> $TARGET/report.md <<'EOF'"
            echo ""
            echo "    ### Patch"
            echo "    - <이번 PR 의 변경 한 줄 요약>"
            echo "    EOF"
            echo "    git add $TARGET/report.md"
            echo "    git commit -m 'docs: report.md patch 노트 추가'"
            echo "    git push"
            echo "::endgroup::"
            echo "::error::$TARGET/report.md 가 이번 PR 변경 파일에 없음 — 로그 group 참고"
            exit 1
          fi

          if ! echo "$CHANGED" | grep -E "^$TARGET/evidence/" | grep -Ev '/(README\.md|\.gitkeep)$' >/dev/null; then
            echo "::group::❌ FAIL: $TARGET/evidence/ 안에 실질적 evidence 파일 변경이 없습니다"
            echo ""
            echo "[원인]"
            echo "  evidence/README.md 또는 .gitkeep 만 변경된 경우는 통과 X."
            echo "  실제 증빙 파일이 1개 이상 변경되어야 합니다."
            echo ""
            echo "[이번 PR 의 evidence 변경]"
            echo "$CHANGED" | grep -E "^$TARGET/evidence/" | sed 's/^/  /' || echo "  (없음)"
            echo ""
            echo "[해결]"
            echo "  이번 PR 의 변경 내용을 입증할 evidence 파일을 추가/수정하세요."
            echo "  예: response-samples.md, test-results.md, layer-separation-notes.md"
            echo "::endgroup::"
            echo "::error::$TARGET/evidence/ 실질 변경 없음 — 로그 group 참고"
            exit 1
          fi

          if [ -d "$TARGET/project" ]; then
            if ! echo "$CHANGED" | grep -E "^$TARGET/project/" | grep -Ev '/(README\.md|\.gitkeep|MEASUREMENT-OPTIONS\.md)$' >/dev/null; then
              echo "::group::❌ FAIL: 코드 미션이지만 $TARGET/project/ 아래 실질적 코드 변경이 없습니다"
              echo ""
              echo "[원인]"
              echo "  project/README.md, .gitkeep, MEASUREMENT-OPTIONS.md 만 변경된 경우는 통과 X."
              echo "  실제 소스 코드가 1개 이상 변경되어야 합니다."
              echo ""
              echo "[이번 PR 의 project 변경]"
              echo "$CHANGED" | grep -E "^$TARGET/project/" | sed 's/^/  /' || echo "  (없음)"
              echo ""
              echo "[해결]"
              echo "  $TARGET/project/ 아래 실제 소스 파일을 변경/추가하세요."
              echo "  (.java, .kt, .sql, .gradle, application.yaml 등)"
              echo "::endgroup::"
              echo "::error::$TARGET/project/ 실질 코드 변경 없음 — 로그 group 참고"
              exit 1
            fi
          fi

      - name: Validate report content
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          CHANGED="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          MISSION_DIRS="$(echo "$CHANGED" | awk -F/ '$1 !~ /^\\./ && $1 != "meta" && $1 != "docs" && NF >= 2 {print $1}' | sort -u)"
          TARGET="$(echo "$MISSION_DIRS" | head -n 1)"
          MISSION_ID="$(basename "$TARGET")"

          # report.md body 길이: frontmatter / 헤더 / 빈 줄 / 체크박스 라인을 빼고
          # 학생이 자기 본문을 한 단락이라도 적었는지 확인 (최소 200자).
          BODY="$(awk '
            BEGIN{ in_fm=0; fm_count=0 }
            /^---[[:space:]]*$/ { fm_count++; if (fm_count<=2) { in_fm=(fm_count==1); next } }
            in_fm { next }
            /^[[:space:]]*#/ { next }
            /^[[:space:]]*-[[:space:]]*\[[ xX]\]/ { next }
            /^[[:space:]]*$/ { next }
            { print }
          ' "$TARGET/report.md")"

          BODY_LEN="$(printf '%s' "$BODY" | tr -d '[:space:]' | wc -c | tr -d ' ')"

          if [ "$BODY_LEN" -lt 200 ]; then
            echo "::group::❌ FAIL: $TARGET/report.md 본문이 너무 짧습니다 (${BODY_LEN}자, 최소 200자 필요)"
            echo ""
            echo "[원인]"
            echo "  frontmatter (---..---), 헤더 (#), 빈 줄, 체크박스 (- [x]) 는 길이에 포함되지 않습니다."
            echo "  학생 본인 문장이 한 단락 (최소 200자) 이상 있어야 합니다."
            echo ""
            echo "[현재 본문 길이] ${BODY_LEN}자"
            echo "[필요 최소 길이] 200자"
            echo ""
            echo "[해결]"
            echo "  $TARGET/report.md 에 본인의 시도·판단·회고를 단락으로 추가하세요."
            echo "  - 어떤 문제를 풀었는가"
            echo "  - 왜 그 설계/구현을 선택했는가"
            echo "  - 막힌 점·다음에 보강할 점"
            echo "::endgroup::"
            echo "::error::report.md 본문 ${BODY_LEN}자 (200자 필요) — 로그 group 참고"
            exit 1
          fi

      - name: Validate code mission has real source change
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          CHANGED="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          MISSION_DIRS="$(echo "$CHANGED" | awk -F/ '$1 !~ /^\\./ && $1 != "meta" && $1 != "docs" && NF >= 2 {print $1}' | sort -u)"
          TARGET="$(echo "$MISSION_DIRS" | head -n 1)"

          # project/가 있는 미션은 .java/.kt/.sql/.gradle 변경이 ≥1 있어야 함.
          if [ -d "$TARGET/project" ]; then
            if ! echo "$CHANGED" | grep -E "^$TARGET/project/.*\.(java|sql|kt|gradle)$" >/dev/null; then
              echo "::group::❌ FAIL: 코드 미션이지만 .java / .sql / .kt / .gradle 파일 변경이 없습니다"
              echo ""
              echo "[원인]"
              echo "  코드 미션은 project/ 아래에 실제 소스 파일 (.java / .sql / .kt / .gradle) 이"
              echo "  최소 1개 이상 변경되어야 합니다."
              echo "  README, MEASUREMENT-OPTIONS, application.yaml 만 변경된 경우는 통과 X."
              echo ""
              echo "[이번 PR 의 project 변경]"
              echo "$CHANGED" | grep -E "^$TARGET/project/" | sed 's/^/  /' || echo "  (없음)"
              echo ""
              echo "[해결]"
              echo "  $TARGET/project/ 아래 .java/.kt/.sql/.gradle 파일을 변경/추가하세요."
              echo "::endgroup::"
              echo "::error::project/ 아래 .java/.sql/.kt/.gradle 변경 없음 — 로그 group 참고"
              exit 1
            fi
          fi

      - name: Validate Week 4~7 before/after evidence
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          CHANGED="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          MISSION_DIRS="$(echo "$CHANGED" | awk -F/ '$1 !~ /^\\./ && $1 != "meta" && $1 != "docs" && NF >= 2 {print $1}' | sort -u)"
          TARGET="$(echo "$MISSION_DIRS" | head -n 1)"
          MISSION_ID="$(basename "$TARGET")"

          # Week 4~7 미션은 evidence/에 before/after 비교 자산이 있어야 함.
          case "$MISSION_ID" in
            05-week4-*|06-week5-*|07-week6-*|08-week7-*)
              if find "$TARGET/evidence" -type f \( -iname "*before*" -o -iname "*after*" \) | head -1 | grep -q .; then
                exit 0
              fi
              if grep -ril -e "before" -e "after" "$TARGET/evidence" | head -1 | grep -q .; then
                exit 0
              fi
              echo "::group::❌ FAIL: Week 4~7 미션은 before/after 비교 증빙이 필요합니다"
              echo ""
              echo "[원인]"
              echo "  $MISSION_ID 는 *성능·동시성 비교* 미션이라 개선 전후 비교가 필수입니다."
              echo "  파일명에 'before' 또는 'after' 가 들어가거나, 파일 본문에 둘 다 언급되어야 합니다."
              echo ""
              echo "[해결]"
              echo "  예시:"
              echo "    $TARGET/evidence/before-latency.md"
              echo "    $TARGET/evidence/after-latency.md"
              echo "  또는 한 파일에 'before:'와 'after:' 섹션을 모두 작성"
              echo "::endgroup::"
              echo "::error::Week 4~7 before/after 증빙 누락 — 로그 group 참고"
              exit 1
              ;;
          esac
