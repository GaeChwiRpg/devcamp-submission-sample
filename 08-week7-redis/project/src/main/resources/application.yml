spring:
  application:
    name: devcamp-starter
  datasource:
    url: jdbc:h2:mem:devcamp;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        # 쿼리 로그가 필요하면 학생이 직접 켭니다. (Week 2 N+1 탐지 등)
        # show_sql: true
  cache:
    type: simple
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        # Week 6 프로파일링·Week 7 캐시 측정용 endpoint를 노출
        include: health,info,metrics,caches,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: 8080

logging:
  level:
    root: INFO
    co.dingcodingco: DEBUG
